[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "financial-risk-lakehouse"
version = "0.1.0"
description = "Enterprise Financial Risk Data Lakehouse Platform"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [
    {name = "Your Team", email = "team@example.com"}
]

dependencies = [
    # Core Data Processing
    "apache-airflow==2.7.3",
    "apache-airflow-providers-amazon==7.7.1",
    "pyspark==3.5.0",
    "dbt-postgres==1.7.0",
    "dbt-core==1.7.0",
    
    # Data Quality & Governance
    "great-expectations==0.18.0",
    "sqlalchemy==2.0.23",
    "pandas==2.1.3",
    "numpy==1.26.2",
    
    # AWS Integration
    "boto3==1.29.7",
    "botocore==1.32.7",
    "pyarrow==13.0.0",
    
    # API & Web
    "fastapi==0.104.1",
    "uvicorn==0.24.0",
    "pydantic==2.5.0",
    
    # Monitoring & Logging
    "prometheus-client==0.19.0",
    "python-json-logger==2.0.7",
    "opentelemetry-api==1.21.0",
    "opentelemetry-sdk==1.21.0",
    
    # Celery for distributed tasks
    "celery==5.3.4",
    "kombu==5.3.4",
    
    # Testing & Quality
    "pytest==7.4.3",
    "pytest-cov==4.1.0",
    "black==23.12.0",
    "flake8==6.1.0",
    "isort==5.13.2",
    
    # Utilities
    "python-dotenv==1.0.0",
    "requests==2.31.0",
    "click==8.1.7",
]

[project.optional-dependencies]
dev = [
    "pytest==7.4.3",
    "pytest-cov==4.1.0",
    "black==23.12.0",
    "flake8==6.1.0",
    "isort==5.13.2",
    "mypy==1.7.1",
]

[project.urls]
Homepage = "https://github.com/your-org/financial-risk-lakehouse"
Documentation = "https://financial-risk-lakehouse.readthedocs.io"
Repository = "https://github.com/your-org/financial-risk-lakehouse"

[tool.black]
line-length = 100
target-version = ['py310']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 100
skip_gitignore = true
known_first_party = ["pipelines", "airflow", "spark"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
addopts = "--cov=. --cov-report=html --cov-report=term-missing"

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true
