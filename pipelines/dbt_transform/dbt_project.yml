name: 'keppler_dbt'
version: '1.0.0'
config-version: 2

profile: 'keppler_dbt'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  keppler_dbt:
    staging:
      +materialized: view
    marts:
      +materialized: table
      +s3_data_dir: s3://keppler-data-architecture/gold/
      +format: parquet
