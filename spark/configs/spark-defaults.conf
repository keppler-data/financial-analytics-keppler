# Spark Default Configuration
# Reference: https://spark.apache.org/docs/latest/configuration.html

# Memory Settings
spark.driver.memory=2g
spark.executor.memory=4g
spark.executor.cores=4
spark.executor.instances=4

# Execution Settings
spark.sql.shuffle.partitions=200
spark.default.parallelism=200
spark.rdd.compress=true
spark.shuffle.compress=true

# Adaptive Query Execution (AQE)
spark.sql.adaptive.enabled=true
spark.sql.adaptive.coalescePartitions.enabled=true
spark.sql.adaptive.skewJoin.enabled=true

# Dynamic Partition Pruning
spark.sql.dynamicPartitionPruning.enabled=true

# Columnar Cache
spark.sql.inMemoryColumnarStorage.compressed=true
spark.sql.inMemoryColumnarStorage.batchSize=10000

# Query Optimization
spark.sql.optimizer.enabled=true
spark.sql.optimizer.nestedSchemaPruning.enabled=true

# Networking
spark.network.timeout=120s
spark.broadcast.timeout=300

# Logging
spark.eventLog.enabled=true
spark.eventLog.dir=/opt/spark/events
spark.history.fs.logDirectory=/opt/spark/history
