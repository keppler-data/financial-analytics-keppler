monitoring:
  # Metrics collection
  metrics:
    enabled: true
    port: 9090
    scrape_interval: 30s
    
  # Alerts
  alerts:
    - name: DAG_Failure
      condition: dag_failed
      threshold: 1
      action: email
      
    - name: Task_Timeout
      condition: task_duration > 3600
      threshold: 5
      action: slack
      
    - name: Data_Quality_Failed
      condition: quality_check_failed
      threshold: 1
      action: email
      
  # SLA Configuration
  sla:
    default_sla_minutes: 1440
    email_on_sla_miss: true

  # Health checks
  health_checks:
    - type: database
      interval: 5m
      timeout: 30s
      
    - type: rabbitmq
      interval: 5m
      timeout: 30s
      
    - type: spark
      interval: 5m
      timeout: 30s
